<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2 class="text-center mb-4">Account Registration</h2>
        
        <form id="registrationForm" novalidate>
            
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Choose a username">
                <div class="error-message" id="usernameError">Username must be at least 3 characters long.</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create a password">
                <div class="error-message" id="passwordError">Password must be at least 6 characters long.</div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Account Type</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="accountType" id="personal" value="Personal">
                    <label class="form-check-label" for="personal">Personal</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="accountType" id="business" value="Business">
                    <label class="form-check-label" for="business">Business</label>
                </div>
                <div class="error-message" id="radioError">Please select an account type.</div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="terms">
                <label class="form-check-label" for="terms">I agree to the terms and conditions</label>
                <div class="error-message" id="termsError">You must agree to the terms to continue.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div id="successMessage" class="alert alert-success mt-4 text-center" style="display: none;">
            Registration Successful! Welcome aboard.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
